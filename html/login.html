<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión | Ximkha</title>
    <link rel="stylesheet" href="../css/estilos.css" />
</head>
<body>

<header>
    <nav class="barra-navegacion">
        <ul class="menu izquierda">
            <li><a href="recetas.html">Recetas</a></li>
            <li><a href="consejos.html">Consejos</a></li>
        </ul>
        <a href="../index.html" class="logo">Ximkha</a>
        <ul class="menu derecha">
            <li><a href="favoritos.html" class="icono" title="Favoritos">❤️</a></li>
            <li><a href="usuario.html" class="icono" title="Usuario">👤</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>
</header>

<main class="seccion-auth">
    <div class="contenedor-auth">

        <!-- Tabs para cambiar entre login y registro -->
        <div class="tabs-auth">
            <button class="tab-btn activo" id="tab-login" onclick="cambiarTab('login')">
                Iniciar Sesión
            </button>
            <button class="tab-btn" id="tab-registro" onclick="cambiarTab('registro')">
                Registrarse
            </button>
        </div>

        <!-- Panel de Login -->
        <div class="panel-auth activo" id="panel-login">
            <div class="formulario-auth">
                <h2>Bienvenido 👋</h2>
                <p class="subtitulo">Inicia sesión para acceder a tu cuenta</p>

                <div class="error-msg" id="error-login"></div>
                <div class="exito-msg" id="exito-login"></div>

                <div class="campo-formulario">
                    <label for="login-email">Correo electrónico</label>
                    <input type="email" id="login-email" placeholder="tu@email.com" />
                </div>

                <div class="campo-formulario">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" placeholder="••••••••" />
                </div>

                <button class="btn-auth" onclick="iniciarSesion()">
                    Iniciar Sesión
                </button>
            </div>

            <div class="pie-auth">
                ¿No tienes cuenta?
                <a href="#" onclick="cambiarTab('registro')">Regístrate aquí</a>
            </div>
        </div>

        <!-- Panel de Registro -->
        <div class="panel-auth" id="panel-registro">
            <div class="formulario-auth">
                <h2>Crear cuenta</h2>
                <p class="subtitulo">Únete a Ximkha y guarda tus recetas favoritas</p>

                <div class="error-msg" id="error-registro"></div>
                <div class="exito-msg" id="exito-registro"></div>

                <div class="campo-formulario">
                    <label for="reg-nombre">Nombre completo</label>
                    <input type="text" id="reg-nombre" placeholder="Tu nombre" />
                </div>

                <div class="campo-formulario">
                    <label for="reg-email">Correo electrónico</label>
                    <input type="email" id="reg-email" placeholder="tu@email.com" />
                </div>

                <div class="campo-formulario">
                    <label for="reg-password">Contraseña</label>
                    <input type="password" id="reg-password" placeholder="Mínimo 4 caracteres" />
                </div>

                <div class="campo-formulario">
                    <label for="reg-password2">Confirmar contraseña</label>
                    <input type="password" id="reg-password2" placeholder="Repite tu contraseña" />
                </div>

                <button class="btn-auth" onclick="registrarse()">
                    Crear Cuenta
                </button>
            </div>

            <div class="pie-auth">
                ¿Ya tienes cuenta?
                <a href="#" onclick="cambiarTab('login')">Inicia sesión</a>
            </div>
        </div>

    </div>
</main>

<footer>
    <p>&copy; 2026 Ximkha — Cocina con alma</p>
</footer>

<script src="../js/login.js"></script>

</body>
</html>
